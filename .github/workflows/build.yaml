name: Build QMK firmware

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "ohropax_keyboard/**"
      - ".github/workflows/qmk-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your keyboard repo
        uses: actions/checkout@v4

      - name: Checkout QMK firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          path: qmk_firmware
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y avr-libc gcc-avr dfu-programmer dfu-util unzip zip
          pip install --upgrade pip
          pip install qmk
          pip install -r qmk_firmware/requirements.txt

          - name: Install ARM toolchain
          run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi
  
      - name: Copy keyboard into QMK tree
        run: |
          rm -rf qmk_firmware/keyboards/ohropax_keyboard
          cp -r ohropax_keyboard qmk_firmware/keyboards/ohropax_keyboard

      - name: Build (keymap:sina)
        working-directory: qmk_firmware
        run: |
          qmk compile -kb ohropax_keyboard -km sina

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp -v qmk_firmware/.build/*.hex artifacts/ || true
          cp -v qmk_firmware/*.hex artifacts/ || true
          ls -la artifacts

      - name: Upload HEX artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmk-hex
          path: artifacts/*.hex
